defaults:
  - _self_
  - /callbacks: [checkpoint_every_n_steps, checkpoint_monitor, learning_rate_monitor]
  - /data: openwebtext
  - /model: small
  - /strategy: ddp
  - /noise: loglinear
  - /lr_scheduler: constant_warmup

mode: train  # train / ppl_eval / sample_eval
diffusion: absorbing_state
backbone: dit  # dit / dimamba / ar
parameterization: subs  # subs / d3pm / sedd
time_conditioning: False
T: 0  # 0 (continuous time) / 1000
subs_masking: False

seed: 2

loader:
  global_batch_size: 512
  eval_global_batch_size: ${.global_batch_size}
  # Note: batch_size and eval_batch_size are **per machine**
  batch_size: ${div_up:${.global_batch_size}, ${eval:${trainer.devices} * ${trainer.num_nodes}}}
  eval_batch_size: ${div_up:${.eval_global_batch_size}, ${eval:${trainer.devices} * ${trainer.num_nodes}}}
  num_workers: ${eval:"len(__import__('os').sched_getaffinity(0))"}
  pin_memory: True

sampling:
  # Sampler. Options:
  #   ddpm, ddpm_cache, analytic : MDLM / SEDD baselines
  #   remasker                   : guided star-shaped sampler (paper eq. 5)
  #   star_shape                 : switches remasker / DDPM by t_on
  #   conf_star_shape            : confidence-based star-shaped variant
  #   p2                         : Path-Planning baseline (Peng et al. 2025)
  predictor: ddpm_cache
  steps: 128
  noise_removal: True
  num_sample_batches: 2
  num_sample_log: 2
  semi_ar: False
  stride_length: 1
  num_strides: 1
  # Remasker-guided sampling
  remasker_temperature: 1.0
  denoiser_temp_during_remasking: 1.0
  remasker_checkpoint_path: ''
  # Apply remasker updates only when t in [remasker_t_off, remasker_t_on]
  remasker_t_off: 0.05
  remasker_t_on: 0.55
  # Remasker training-time sampling parameters
  t_sampling: uniform   # 'uniform' or 'const'
  t_const: 1.0          # used when t_sampling == 'const'
  freeze_backbone: False
  nucleus_p: 1.0
  eta: 0.008
  remdm_mode: null      # null / "cap"
  save_x0_sample: False
  use_fp64: False
  remasker_adaptive_sampling: False
  # Remasker training-time augmentations applied to non-padding tokens of x_s.
  uniform_ratio: 0.0          # fraction replaced with uniform vocabulary samples
  prior_ratio: 0.0            # fraction replaced with token-frequency prior samples
  semantic_change_ratio: 0.0  # per-sequence fraction; nearest-neighbor swap in embedding space
  interval_shuffle_ratio: 0.0 # per-sequence fraction; shuffle tokens inside random length-4-8 intervals
  fix_train_inference_mismatch: False

remasker:
  # If set to an integer N, the remasker backbone uses only the first N transformer
  # blocks of the DIT (ignoring the rest).
  take_first_n_layers: null
  # Training strategy: default | random_corruption | ar_perplexity
  training_strategy: default
  # random_corruption strategy: fraction of tokens to corrupt with random tokens.
  corruption_ratio: 0.1
  # ar_perplexity strategy: AR model used for per-token NLL scoring.
  ar_model_name: gpt2
  # ar_perplexity strategy: tokens with per-token NLL above this threshold are labeled as errors.
  ar_nll_threshold: 3.0

p2:
  # Path-Planning (P2) baseline parameters.
  eta: 1.0              # remasking strength
  use_argmax: False     # argmax instead of sampling for proposals
  temperature: 1.0      # temperature for proposal sampling
  nucleus_p: 1.0        # nucleus (top-p); 1.0 disables
  confidence_type: prob # prob | max_prob
  # Apply P2 updates only when t in [t_off, t_on]; outside falls back to DDPM.
  t_off: 0.0
  t_on: 1.0

training:
  ema: 0.9999
  antithetic_sampling: True
  importance_sampling: False
  sampling_eps: 1e-3
  change_of_variables: False
  # Reweight BCE so 0/1 classes contribute equally in remasker loss.
  remasker_reweighting: False
  # Compute loss only over tokens newly generated between x_t and x_s.
  remasker_loss_only_new_tokens: False
  # Self-consistency target: compare 1-step xs vs k-step x_sk.
  remasker_self_consistency: False
  # Number of MDLM DDPM steps from x_t to build x_sk when self-consistency is enabled.
  remasker_self_consistency_k: 4
  # Replace BCE with RankNet pairwise ranking loss.
  # Encourages to-be-remasked tokens (label=1) to get higher logits than correct ones (label=0)
  # within the same sequence.
  remasker_use_ranknet_pairwise_loss: False

eval:
  checkpoint_path: ''
  disable_ema: False
  compute_generative_perplexity: False
  perplexity_batch_size: 8
  compute_perplexity_on_sanity: False
  gen_ppl_eval_model_name_or_path: gpt2-large
  generate_samples: True
  # Save per-step sampling trajectories during evaluation/sampling.
  save_sampling_trajectory: True
  max_trajectories_to_save: 5

optim:
  weight_decay: 0
  lr: 3e-4
  beta1: 0.9
  beta2: 0.999
  eps: 1e-8

trainer:
  _target_: lightning.Trainer
  accelerator: cuda
  num_nodes: 1
  devices: ${device_count:}
  accumulate_grad_batches: ${div_up:${loader.global_batch_size}, ${eval:${trainer.devices} * ${loader.batch_size} * ${trainer.num_nodes}}}
  gradient_clip_val: 1.0
  precision: 'bf16'
  num_sanity_val_steps: 2
  max_steps: ${eval:${trainer.accumulate_grad_batches} * 1_000_000}
  log_every_n_steps: 10
  limit_train_batches: 1.0
  limit_val_batches: 1.0
  val_check_interval: 10000

wandb:
  project: guided-star-shape-mdlm
  notes: Guided star-shaped masked diffusion
  group: null
  job_type: null
  name: run_${now:%Y.%m.%d}
  id: ${.name}_${seed}
  tags:
    - ${noise.type}
    - ${data.train}
    - ${data.valid}

hydra:
  run:
    dir: ./outputs/${data.train}/${now:%Y.%m.%d}/${now:%H%M%S}
  job:
    chdir: true

checkpointing:
  save_dir: ${cwd:}
  resume_from_ckpt: true
  resume_ckpt_path: ${.save_dir}/checkpoints/last.ckpt
